<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>CLIX CLAN | NOTICE</title>
    <style>
        body { background: #0a0a0a; color: #fff; font-family: 'Inter', sans-serif; margin: 0; padding: 50px 8%; }
        .header { border-bottom: 2px solid #ff5e00; padding-bottom: 20px; margin-bottom: 40px; display: flex; justify-content: space-between; align-items: center; }
        h1 { color: #ff5e00; letter-spacing: 5px; margin: 0; }
        .back-btn { color: #888; text-decoration: none; font-weight: 800; border: 1px solid #333; padding: 10px 20px; transition: 0.3s; }
        
        /* 관리자 전용 작성 UI (기본 숨김) */
        #admin-editor { display: none; background: #111; border: 1px solid #ff5e00; padding: 25px; margin-bottom: 40px; border-radius: 8px; }
        input, textarea { width: 100%; padding: 12px; margin-bottom: 15px; background: #222; border: 1px solid #333; color: #fff; box-sizing: border-box; }
        .btn-save { background: #ff5e00; color: #fff; padding: 12px; border: none; font-weight: 800; cursor: pointer; width: 100%; }
        
        /* 공지 리스트 스타일 */
        .notice-card { background: #161616; border-left: 5px solid #ff5e00; padding: 25px; margin-bottom: 20px; position: relative; }
        .tag { background: #ff5e00; color: #fff; padding: 3px 10px; font-size: 0.8rem; font-weight: 800; margin-right: 10px; }
        .date { color: #555; float: right; }
        .content { margin-top: 15px; color: #aaa; line-height: 1.6; white-space: pre-wrap; }
        
        /* 관리자 전용 삭제 버튼 (기본 숨김) */
        .btn-del { color: #ff3333; cursor: pointer; font-size: 0.8rem; margin-top: 15px; display: none; border: 1px solid #333; padding: 5px 10px; width: fit-content; }
        
        /* 관리자 로그인 버튼 (구석에 숨김) */
        #admin-login-trigger { position: fixed; bottom: 10px; right: 10px; font-size: 10px; color: #111; cursor: pointer; }
    </style>
</head>
<body>
    <div class="header">
        <h1>NOTICE</h1>
        <a href="index.html" class="back-btn">BACK TO HOME</a>
    </div>

    <div id="admin-editor">
        <h3 style="margin-top:0; color:#ff5e00;">📢 공지사항 작성 (관리자전용)</h3>
        <input type="text" id="tag" placeholder="태그 (예: [공지], [패치])">
        <input type="text" id="title" placeholder="제목">
        <textarea id="content" rows="5" placeholder="내용을 입력하세요"></textarea>
        <button class="btn-save" onclick="saveNotice()">홈페이지에 게시하기</button>
    </div>

    <div id="notice-list">
        </div>

    <div id="admin-login-trigger" onclick="unlockAdmin()">ADMIN</div>

    <script>
        // 페이지 로드 시 글 불러오기 + 이미 인증됐는지 확인
        window.onload = function() {
            displayNotices();
            if(sessionStorage.getItem('clix_admin') === 'true') {
                showAdminUI();
            }
        };

        // 관리자 인증 함수
        function unlockAdmin() {
            const pw = prompt("관리자 코드를 입력하세요.");
            if (pw === "1541") { // 입장코드와 동일하게 설정
                sessionStorage.setItem('clix_admin', 'true');
                showAdminUI();
                alert("관리자 모드가 활성화되었습니다.");
            } else {
                alert("권한이 없습니다.");
            }
        }

        function showAdminUI() {
            document.getElementById('admin-editor').style.display = 'block';
            const delBtns = document.querySelectorAll('.btn-del');
            delBtns.forEach(btn => btn.style.display = 'block');
        }

        function saveNotice() {
            const title = document.getElementById('title').value;
            const tag = document.getElementById('tag').value || '[공지]';
            const content = document.getElementById('content').value;
            const date = new Date().toLocaleDateString();

            if (!title || !content) return alert("내용을 입력하세요!");

            let notices = JSON.parse(localStorage.getItem('clix_notices')) || [];
            notices.unshift({ title, tag, content, date });
            localStorage.setItem('clix_notices', JSON.stringify(notices));

            location.reload(); // 새로고침해서 반영
        }

        function displayNotices() {
            const notices = JSON.parse(localStorage.getItem('clix_notices')) || [];
            const list = document.getElementById('notice-list');
            let html = '';

            notices.forEach((n, index) => {
                html += `
                    <div class="notice-card">
                        <span class="tag">${n.tag}</span> <strong>${n.title}</strong>
                        <span class="date">${n.date}</span>
                        <div class="content">${n.content}</div>
                        <div class="btn-del" onclick="deleteNotice(${index})">삭제하기</div>
                    </div>
                `;
            });
            list.innerHTML = html || '<p style="text-align:center; color:#444;">등록된 공지가 없습니다.</p>';
        }

        function deleteNotice(index) {
            if(confirm("이 공지를 삭제하시겠습니까?")) {
                let notices = JSON.parse(localStorage.getItem('clix_notices')) || [];
                notices.splice(index, 1);
                localStorage.setItem('clix_notices', JSON.stringify(notices));
                displayNotices();
            }
        }
    </script>
</body>
</html>
