<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PUBG CLIX | 자유게시판</title>
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore-compat.js"></script>
    <style>
        body { margin: 0; padding: 140px 8% 50px 8%; background-color: #0a0a0a; color: #ffffff; font-family: 'Inter', sans-serif; line-height: 1.6; -webkit-user-select: none; user-select: none; }
        nav { display: flex; justify-content: space-between; align-items: center; padding: 20px 8%; background: rgba(0,0,0,0.95) !important; position: fixed; width: 100%; top: 0; left: 0; box-sizing: border-box; z-index: 100; border-bottom: 1px solid #222; }
        nav .logo { font-weight: 900; font-size: 26px; color: #ff5e00 !important; text-decoration: none; text-transform: uppercase; }
        nav ul { list-style: none; display: flex; margin: 0; padding: 0; }
        nav ul li a { margin-left: 20px; font-size: 12px; color: #999; text-decoration: none; text-transform: uppercase; font-weight: 600; }
        .header { border-bottom: 2px solid #ff5e00; padding-bottom: 20px; margin-bottom: 40px; }
        h1 { color: #ff5e00; letter-spacing: 3px; margin: 0; font-size: 2.5rem; text-transform: uppercase; font-weight: 900; }
        #write-section { display: none; border: 1px solid #222; padding: 30px; margin-bottom: 50px; border-radius: 8px; background: #111; }
        textarea { width: 100%; padding: 15px; background: #1a1a1a; border: 1px solid #333; color: #fff; border-radius: 4px; box-sizing: border-box; resize: none; margin-bottom: 15px; font-family: inherit; }
        input[type="text"] { width: 100%; padding: 12px; background: #1a1a1a; border: 1px solid #333; color: #fff; border-radius: 4px; margin-bottom: 15px; box-sizing: border-box; font-family: inherit; }
        .btn-post { background: #ff5e00; color: #fff; padding: 15px; border: none; font-weight: 900; cursor: pointer; width: 100%; text-transform: uppercase; border-radius: 4px; }
        .post-card { background: #111; border: 1px solid #222; border-radius: 12px; padding: 30px; margin-bottom: 25px; position: relative; }
        .post-header { display: flex; justify-content: space-between; margin-bottom: 15px; padding-bottom: 15px; border-bottom: 1px solid #222; }
        .post-author { color: #ff5e00; font-weight: 800; }
        .post-date { color: #555; font-size: 0.8rem; }
        .post-content { color: #ddd; white-space: pre-wrap; font-size: 1.1rem; margin-bottom: 15px; }
        .post-media { margin-top: 15px; text-align: center; background: #000; border-radius: 8px; overflow: hidden; }
        .post-media img, .post-media video { max-width: 100%; max-height: 500px; border: none; display: block; margin: 0 auto; }
        .btn-del { color: #ff3333; cursor: pointer; font-size: 0.75rem; position: absolute; bottom: 30px; right: 30px; display: none; font-weight: bold; border: 1px solid #422; padding: 5px 10px; border-radius: 4px; }
    </style>
</head>
<body>
    <nav><a href="index.html" class="logo">CLAN CLIX</a><ul><li><a href="index.html#about">ABOUT</a></li><li><a href="notice.html">NOTICE</a></li><li><a href="board.html" style="color:#ff5e00;">BOARD</a></li></ul></nav>
    <div class="header"><h1>BOARD</h1></div>

    <div id="write-section">
        <div id="display-nick" style="color:#ff5e00; font-weight:800; margin-bottom:10px;">작성자 로딩 중...</div>
        <textarea id="post-content" rows="4" placeholder="내용을 입력하세요."></textarea>
        <input type="text" id="media-url" placeholder="사진/영상 주소 입력 (영상은 유튜브 링크가 아닌 파일 원본 링크여야 함)">
        <button class="btn-post" onclick="savePost()">POST MESSAGE</button>
    </div>

    <div id="login-notice" style="text-align:center; padding:30px; border:1px dashed #333; color:#555;">로그인 회원만 작성 가능합니다. <a href="index.html" style="color:#ff5e00;">로그인하기</a></div>
    <div id="board-container"></div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyAFSAu2aynX6YPiJEatWy9IQgWgUuTx8ds",
            authDomain: "korclix.firebaseapp.com",
            projectId: "korclix",
            storageBucket: "korclix.firebasestorage.app",
            messagingSenderId: "472792477536",
            appId: "1:472792477536:web:14907e228c343b72fd7805"
        };
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();
        let userNick = "";

        auth.onAuthStateChanged((user) => {
            if (user && user.emailVerified) {
                document.getElementById('write-section').style.display = 'block';
                document.getElementById('login-notice').style.display = 'none';
                db.collection("users").doc(user.uid).get().then(doc => {
                    userNick = doc.exists ? doc.data().nickname : "익명";
                    document.getElementById('display-nick').innerText = "작성자: " + userNick;
                });
            }
            loadPosts();
        });

        function loadPosts() {
            db.collection("board").orderBy("timestamp", "desc").onSnapshot(snapshot => {
                const container = document.getElementById('board-container');
                container.innerHTML = "";
                snapshot.forEach(doc => {
                    const data = doc.data();
                    const date = data.timestamp ? data.timestamp.toDate().toLocaleString('ko-KR') : '방금 전';
                    const masterMode = sessionStorage.getItem('clix_master') === 'true';

                    let mediaHtml = "";
                    if (data.mediaUrl) {
                        const url = data.mediaUrl.trim().toLowerCase();
                        // 확장자 체크 강화 (mp4, webm, ogg, mov)
                        const isVideo = url.includes('.mp4') || url.includes('.webm') || url.includes('.ogg') || url.includes('.mov');
                        
                        if (isVideo) {
                            // 비디오 태그 속성 강화 (컨트롤러, 자동재생 방지, 프리로드)
                            mediaHtml = `
                                <div class="post-media">
                                    <video controls preload="metadata" playsinline style="width:100%;">
                                        <source src="${data.mediaUrl}" type="video/mp4">
                                        브라우저가 비디오 재생을 지원하지 않습니다.
                                    </video>
                                </div>`;
                        } else {
                            mediaHtml = `<div class="post-media"><img src="${data.mediaUrl}" onerror="this.parentElement.style.display='none'"></div>`;
                        }
                    }

                    container.innerHTML += `
                        <div class="post-card">
                            <div class="post-header">
                                <span class="post-author">${data.nickname}</span>
                                <span class="post-date">${date}</span>
                            </div>
                            <div class="post-content">${data.content}</div>
                            ${mediaHtml}
                            <button class="btn-del" style="display:${masterMode ? 'block' : 'none'}" onclick="deletePost('${doc.id}')">DELETE</button>
                        </div>`;
                });
            });
        }

        async function savePost() {
            const content = document.getElementById('post-content').value.trim();
            const mediaUrl = document.getElementById('media-url').value.trim();
            if (!content && !mediaUrl) return alert("내용 또는 주소를 입력하세요.");

            await db.collection("board").add({
                nickname: userNick,
                content: content,
                mediaUrl: mediaUrl || null,
                timestamp: firebase.firestore.FieldValue.serverTimestamp()
            });
            document.getElementById('post-content').value = "";
            document.getElementById('media-url').value = "";
        }

        function deletePost(id) {
            if(confirm("이 게시글을 삭제하시겠습니까?")) {
                db.collection("board").doc(id).delete();
            }
        }
    </script>
</body>
</html>
