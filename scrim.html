<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PUBG CLIX | SCRIM RECORD</title>
    
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore-compat.js"></script>

    <style>
        body { margin: 0; padding: 140px 8% 50px 8%; background-color: #080808; color: #ffffff; font-family: 'Inter', sans-serif; line-height: 1.6; -webkit-user-select: none; user-select: none; }

        /* 블러 네비게이션 */
        nav { display: flex; justify-content: space-between; align-items: center; padding: 20px 8%; background: rgba(8, 8, 8, 0.8) !important; backdrop-filter: blur(10px); position: fixed; width: 100%; top: 0; left: 0; box-sizing: border-box; z-index: 100; border-bottom: 1px solid rgba(255,255,255,0.05); }
        nav .logo { font-weight: 900; font-size: 26px; color: #ff5e00; text-decoration: none; text-transform: uppercase; letter-spacing: 1px; }
        nav ul { list-style: none; display: flex; margin: 0; padding: 0; }
        nav ul li a { margin-left: 20px; font-size: 12px; color: #888; text-decoration: none; text-transform: uppercase; font-weight: 600; transition: 0.3s; }
        nav ul li a:hover { color: #ff5e00; }

        /* 고급 헤더 */
        .header { display: flex; justify-content: space-between; align-items: flex-end; margin-bottom: 40px; padding-bottom: 20px; border-bottom: 1px solid rgba(255, 94, 0, 0.2); position: relative; }
        .header::after { content: ''; position: absolute; bottom: -1px; left: 0; width: 150px; height: 2px; background: #ff5e00; box-shadow: 0 0 15px rgba(255, 94, 0, 0.6); }
        h1 { color: #fff; letter-spacing: 3px; margin: 0; font-size: 2.5rem; text-transform: uppercase; font-weight: 900; }

        /* 관리자 입력 폼 (글래스모피즘) */
        #admin-editor { display: none; background: rgba(20, 20, 20, 0.6); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.05); padding: 30px; margin-bottom: 50px; border-radius: 12px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .editor-title { color: #ff5e00; font-weight: 900; font-size: 1.1rem; margin-bottom: 20px; display: block; letter-spacing: 1px; text-transform: uppercase; }
        .input-group { display: grid; grid-template-columns: 1fr 2fr 2fr; gap: 15px; margin-bottom: 15px; }
        input, textarea { width: 100%; padding: 15px; background: rgba(0, 0, 0, 0.4); border: 1px solid rgba(255, 255, 255, 0.1); color: #fff; box-sizing: border-box; font-family: inherit; border-radius: 8px; outline: none; transition: 0.3s; }
        input:focus, textarea:focus { border-color: #ff5e00; background: rgba(0,0,0,0.6); box-shadow: 0 0 15px rgba(255,94,0,0.1); }
        textarea { resize: vertical; min-height: 120px; }
        .btn-save { background: linear-gradient(135deg, #ff5e00, #e65500); color: #fff; padding: 15px; border: none; font-weight: 900; cursor: pointer; width: 100%; text-transform: uppercase; border-radius: 8px; font-size: 1rem; margin-top: 10px; transition: 0.3s; letter-spacing: 2px; }
        .btn-save:hover { box-shadow: 0 5px 20px rgba(255, 94, 0, 0.4); transform: translateY(-2px); }

        /* 매치 기록 리스트 & 카드 */
        .scrim-list { display: grid; gap: 20px; }
        .scrim-card { background: rgba(15, 15, 15, 0.8); border: 1px solid rgba(255, 255, 255, 0.03); border-radius: 12px; padding: 30px; position: relative; transition: 0.3s; backdrop-filter: blur(5px); display: flex; flex-direction: column; }
        .scrim-card:hover { border-color: rgba(255, 255, 255, 0.1); background: rgba(20, 20, 20, 0.9); box-shadow: 0 10px 30px rgba(0,0,0,0.4); transform: translateY(-3px); }
        
        .scrim-header { display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid rgba(255,255,255,0.05); padding-bottom: 15px; margin-bottom: 20px; }
        .scrim-title { font-size: 1.3rem; font-weight: 900; color: #fff; text-transform: uppercase; letter-spacing: 1px; }
        .scrim-date-badge { background: rgba(255,255,255,0.05); color: #ccc; padding: 6px 15px; border-radius: 20px; font-size: 0.85rem; font-weight: 800; letter-spacing: 1px; }
        
        .scrim-result { font-size: 1.25rem; color: #4ee29d; font-weight: 900; margin-bottom: 15px; text-shadow: 0 0 15px rgba(78, 226, 157, 0.3); border-left: 3px solid #4ee29d; padding-left: 15px; }
        .scrim-details { color: #bbb; white-space: pre-wrap; font-size: 1rem; line-height: 1.8; background: rgba(0,0,0,0.3); padding: 20px; border-radius: 8px; border: 1px solid rgba(255,255,255,0.02); }
        
        .btn-del { color: #888; cursor: pointer; font-size: 0.8rem; position: absolute; top: 30px; right: 30px; display: none; font-weight: 800; background: none; border: none; text-decoration: underline; transition: 0.3s; }
        .btn-del:hover { color: #ff3333; }
    </style>
</head>
<body>

    <nav>
        <a href="index.html" class="logo">CLAN CLIX</a>
        <ul>
            <li><a href="index.html#about">ABOUT</a></li>
            <li><a href="notice.html">NOTICE</a></li>
            <li><a href="board.html">BOARD</a></li>
            <li><a href="scrim.html" style="color: #ff5e00;">SCRIM</a></li>
            <li><a href="tactics.html">TACTICS</a></li>
        </ul>
    </nav>

    <div class="header">
        <h1>SCRIM RECORD</h1>
    </div>

    <div id="admin-editor">
        <span class="editor-title">내전 및 스크림 결과 등록 (관리자)</span>
        <div class="input-group">
            <input type="date" id="match-date" required>
            <input type="text" id="match-title" placeholder="매치명 (예: 제 1회 클랜 정기 내전)">
            <input type="text" id="match-result" placeholder="핵심 결과 (예: Team A 우승 / 총 25킬)">
        </div>
        <textarea id="match-details" placeholder="상세 참가자 명단 및 매치 기록을 자유롭게 입력하세요."></textarea>
        <button class="btn-save" onclick="saveScrim()">기록 등록하기</button>
    </div>

    <div class="scrim-list" id="scrim-container">
        <p style="text-align:center; color:#555; padding: 50px 0;">데이터를 불러오는 중입니다...</p>
    </div>

    <script>
        const firebaseConfig = { apiKey: "AIzaSyAFSAu2aynX6YPiJEatWy9IQgWgUuTx8ds", authDomain: "korclix.firebaseapp.com", projectId: "korclix", storageBucket: "korclix.firebasestorage.app", messagingSenderId: "472792477536", appId: "1:472792477536:web:14907e228c343b72fd7805" };
        firebase.initializeApp(firebaseConfig); const auth = firebase.auth(); const db = firebase.firestore();

        let isUserAdmin = false;
        const DISCORD_WEBHOOK_URL = "https://discord.com/api/webhooks/1491054650411978954/VNb4rgYvRZQ-X932PMUO6NlPSKtzjdLNKRPr8lx25WjHbf4e5mLkhHLa45yMwj48myyF";

        function sendDiscordWebhook(title, author, content) {
            const payload = { content: "📢 **[스크림/내전] 새로운 결과가 등록되었습니다.**", embeds: [{ title: title, description: content.length > 200 ? content.substring(0, 200) + "..." : content, color: 16735744, author: { name: author } }] };
            fetch(DISCORD_WEBHOOK_URL, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(payload) }).catch(e => console.error(e));
        }

        document.getElementById('match-date').valueAsDate = new Date();

        auth.onAuthStateChanged((user) => {
            if (user && user.emailVerified) {
                db.collection("users").doc(user.uid).get().then((doc) => { isUserAdmin = doc.exists ? (doc.data().isAdmin === true) : false; updateAdminUI(); loadScrims(); });
            } else { isUserAdmin = false; updateAdminUI(); loadScrims(); }
        });

        function updateAdminUI() { document.getElementById('admin-editor').style.display = isUserAdmin ? 'block' : 'none'; }

        function loadScrims() {
            db.collection("scrims").orderBy("date", "desc").onSnapshot((querySnapshot) => {
                const container = document.getElementById('scrim-container'); container.innerHTML = ""; 
                if (querySnapshot.empty) { container.innerHTML = '<p style="text-align:center; color:#555; padding: 50px 0;">등록된 매치 기록이 없습니다.</p>'; return; }
                const adminDisplay = isUserAdmin ? 'block' : 'none';
                querySnapshot.forEach((doc) => {
                    const data = doc.data();
                    container.innerHTML += `
                        <div class="scrim-card">
                            <div class="scrim-header">
                                <div class="scrim-title">${data.title}</div>
                                <div class="scrim-date-badge">${data.date}</div>
                            </div>
                            <div class="scrim-result">${data.result}</div>
                            <div class="scrim-details">${data.details}</div>
                            <button class="btn-del" style="display:${adminDisplay}" onclick="deleteScrim('${doc.id}')">삭제</button>
                        </div>`;
                });
            });
        }

        function saveScrim() {
            if (!isUserAdmin) return alert("권한이 없습니다.");
            const date = document.getElementById('match-date').value; const title = document.getElementById('match-title').value.trim(); const result = document.getElementById('match-result').value.trim(); const details = document.getElementById('match-details').value.trim();
            if(!date || !title || !result || !details) return alert("모든 항목을 입력하십시오.");

            db.collection("scrims").add({ date: date, title: title, result: result, details: details, timestamp: firebase.firestore.FieldValue.serverTimestamp() }).then(() => {
                document.getElementById('match-title').value = ''; document.getElementById('match-result').value = ''; document.getElementById('match-details').value = '';
                sendDiscordWebhook(`[${date}] ${title} - ${result}`, "관리자", details);
            }).catch(e => alert("오류: " + e.message));
        }

        function deleteScrim(docId) { if (isUserAdmin && confirm("삭제하시겠습니까?")) db.collection("scrims").doc(docId).delete(); }
    </script>
</body>
</html>
</body>
</html>
